<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Музыкальный поиск</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!--экран приветствия-->
  <div id="welcome-screen">
    <h1>Добро пожаловать!</h1>
    <label for="name-input">Введите ваше имя:</label>
    <input type="text" id="name-input" placeholder="Имя">
    <button id="start-btn">Далее</button>
  </div>

  <!--главный экран (изначально скрыт)-->
  <div id="main-screen" class="hidden">
    <header>
      <h2 id="greeting"></h2>
    </header>
    <main>
      <div class="controls">
        <div class="search-group">
          <input type="text" id="search-input" placeholder="Введите исполнителя или песню">
          <button id="search-btn">Поиск</button>
        </div>
        <div class="filters">
          <label>
            Сортировка:
            <select id="sort-select">
              <option value="default">По умолчанию</option>
              <option value="name">По названию</option>
              <option value="artist">По исполнителю</option>
              <option value="album">По альбому</option>
            </select>
          </label>
          <label>
            <input type="checkbox" id="preview-filter">
            Только с превью
          </label>
          <button id="stats-btn">Показать статистику</button>
        </div>
      </div>
      <div id="results-container">
        <p id="no-results">Введите запрос и нажмите "Поиск"</p>
      </div>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
